<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Data Siswa - SMPN 1 Dawan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- SheetJS for Excel handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
            user-select: none; /* Anti Copy */
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Sembunyikan scrollbar tapi tetap bisa scroll */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        #app-container { min-height: 100vh; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Anti Klik Kanan -->

    <!-- CONFIGURATION & STATE -->
    <script>
        // KONFIGURASI APLIKASI
        // UBAH IS_PREVIEW KE false JIKA AKAN DI-DEPLOY KE WEB APP GAS
        const IS_PREVIEW = false; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzd_BZLgIQCZV7B5k20OIIX7fdZW1_GRPvIcKsRY4fc5zHefguIiS_rNLpf5YGi0hDdNg/exec";
        
        // State Management
        let currentState = {
            view: 'login', // login, admin-login, student-dash, admin-dash
            user: null,
            allStudents: [],
            stats: { total: 0, sesuai: 0, tidak: 0, belum: 0 }
        };

        // Dummy Data untuk Mode Preview
        const DUMMY_DATA = [
            { nisn: '12345', nama: 'Siswa Percobaan', tempat: 'Klungkung', tanggal: '2008-01-01', kelas: '9A', status: 'Belum' },
            { nisn: '11111', nama: 'Budi Santoso', tempat: 'Dawan', tanggal: '2009-05-12', kelas: '8B', status: 'Sesuai' },
            { nisn: '22222', nama: 'Ani Wijaya', tempat: 'Semarapura', tanggal: '2008-11-20', kelas: '9C', status: 'Tidak Sesuai' }
        ];
        const DUMMY_ADMIN_PASS = "50102335";
    </script>

    <div id="app-container" class="flex flex-col">
        <!-- Notifikasi Loading Global -->
        <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-[9999] hidden flex items-center justify-center">
            <div class="bg-white p-5 rounded-lg flex flex-col items-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-gray-700 font-medium">Memproses data...</p>
            </div>
        </div>

        <!-- Render Target -->
        <div id="main-content" class="flex-grow flex items-center justify-center p-4"></div>
    </div>

    <!-- TEMPLATES -->
    <script id="tpl-login" type="text/template">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 transform transition-all hover:scale-[1.01]">
            <div class="flex flex-col items-center mb-8">
                <img src="https://i.ibb.co.com/DPQsmGBk/logo-smp.png" alt="Logo SMPN 1 Dawan" class="w-24 h-24 object-contain mb-4">
                <h1 class="text-2xl font-bold text-blue-800 text-center uppercase">Verifikasi Data Siswa</h1>
                <p class="text-gray-500 text-sm">SMP Negeri 1 Dawan</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username (NISN)</label>
                    <input type="text" id="login-user" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Masukkan NISN">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password (NISN)</label>
                    <input type="password" id="login-pass" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Masukkan Password">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow-lg transition-all active:scale-95">
                    MASUK KE SISTEM
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-dashed border-gray-200 text-center">
                <a href="javascript:void(0)" onclick="navigateTo('admin-login')" class="text-xs text-gray-400 hover:text-blue-600 transition-colors">
                    Halaman Untuk Pak Andhi
                </a>
            </div>
        </div>
    </script>

    <script id="tpl-admin-login" type="text/template">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border-t-4 border-yellow-500">
            <div class="text-center mb-6">
                <span class="text-4xl">😎</span>
                <h2 class="text-xl font-semibold mt-4 text-gray-800">Selamat Datang Pak Andhi Ganteng, Masukin Passwordnya dulu donk :D</h2>
            </div>
            <div class="space-y-4">
                <input type="password" id="admin-pass" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-yellow-500 focus:outline-none text-center text-xl tracking-widest" placeholder="••••••••">
                <div class="flex gap-2">
                    <button onclick="navigateTo('login')" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-lg transition-all">BATAL</button>
                    <button onclick="handleAdminLogin()" class="flex-[2] bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-lg shadow-lg transition-all">MASUK PAK E!</button>
                </div>
            </div>
        </div>
    </script>

    <script id="tpl-student-dash" type="text/template">
        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-blue-800 p-6 text-white flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold">Dashboard Siswa</h2>
                    <p class="text-blue-200 text-xs">Pastikan data Anda sudah benar</p>
                </div>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 p-2 rounded-lg text-sm">Keluar</button>
            </div>
            <div class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-500 font-bold uppercase mb-1">Nama Lengkap</p>
                        <p class="font-semibold text-gray-800 text-lg">{{nama}}</p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-500 font-bold uppercase mb-1">NISN</p>
                        <p class="font-semibold text-gray-800 text-lg">{{nisn}}</p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-500 font-bold uppercase mb-1">Tempat Lahir</p>
                        <p class="font-semibold text-gray-800 text-lg">{{tempat}}</p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-500 font-bold uppercase mb-1">Tanggal Lahir</p>
                        <p class="font-semibold text-gray-800 text-lg">{{tanggal}}</p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100 md:col-span-2">
                        <p class="text-xs text-blue-500 font-bold uppercase mb-1">Kelas</p>
                        <p class="font-semibold text-gray-800 text-lg">{{kelas}}</p>
                    </div>
                </div>

                <div class="bg-gray-100 p-6 rounded-2xl border-2 border-dashed border-gray-300">
                    <p class="text-center font-bold text-gray-700 mb-4">Apakah data di atas sudah sesuai?</p>
                    <div class="flex justify-center gap-8">
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="confirm" value="Sesuai" class="w-5 h-5 text-green-600 focus:ring-green-500" {{check_sesuai}}>
                            <span class="text-lg font-medium text-gray-600 group-hover:text-green-600">Sesuai</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="confirm" value="Tidak Sesuai" class="w-5 h-5 text-red-600 focus:ring-red-500" {{check_tidak}}>
                            <span class="text-lg font-medium text-gray-600 group-hover:text-red-600">Tidak Sesuai</span>
                        </label>
                    </div>
                    <button onclick="submitKonfirmasi()" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">SIMPAN KONFIRMASI</button>
                </div>
            </div>
        </div>
    </script>

    <script id="tpl-admin-dash" type="text/template">
        <div class="w-full max-w-6xl flex flex-col h-[90vh]">
            <!-- Header Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div onclick="filterData('Semua')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 cursor-pointer hover:shadow-md transition-all">
                    <p class="text-xs text-gray-500 font-bold uppercase">Total Siswa</p>
                    <p class="text-2xl font-bold text-blue-600">{{total}}</p>
                </div>
                <div onclick="filterData('Sesuai')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500 cursor-pointer hover:shadow-md transition-all">
                    <p class="text-xs text-gray-500 font-bold uppercase">Sesuai</p>
                    <p class="text-2xl font-bold text-green-600">{{sesuai}}</p>
                </div>
                <div onclick="filterData('Tidak Sesuai')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500 cursor-pointer hover:shadow-md transition-all">
                    <p class="text-xs text-gray-500 font-bold uppercase">Tidak Sesuai</p>
                    <p class="text-2xl font-bold text-red-600">{{tidak}}</p>
                </div>
                <div onclick="filterData('Belum')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500 cursor-pointer hover:shadow-md transition-all">
                    <p class="text-xs text-gray-500 font-bold uppercase">Belum Konfirmasi</p>
                    <p class="text-2xl font-bold text-yellow-600">{{belum}}</p>
                </div>
            </div>

            <!-- Main Content Card -->
            <div class="bg-white flex-grow rounded-2xl shadow-xl overflow-hidden flex flex-col">
                <div class="p-6 border-b flex flex-wrap justify-between items-center gap-4">
                    <div class="flex items-center gap-4">
                        <img src="https://i.ibb.co.com/DPQsmGBk/logo-smp.png" class="h-10 w-auto">
                        <h2 class="text-xl font-bold text-gray-800">Panel Admin Pak Andhi</h2>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="showImportModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Import Kolektif</button>
                        <button onclick="exportExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Download Rekap</button>
                        <button onclick="showAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Tambah Data</button>
                        <button onclick="showSettingsModal()" class="bg-gray-800 hover:bg-black text-white px-4 py-2 rounded-lg text-sm font-medium">⚙️</button>
                        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium">Keluar</button>
                    </div>
                </div>
                
                <div class="overflow-auto flex-grow p-6">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-gray-50 text-gray-600 text-sm uppercase">
                            <tr>
                                <th class="p-3 border-b">NISN</th>
                                <th class="p-3 border-b">Nama Siswa</th>
                                <th class="p-3 border-b text-center">Kelas</th>
                                <th class="p-3 border-b text-center">Status</th>
                                <th class="p-3 border-b text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- Rows dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </script>

    <!-- CORE LOGIC JS -->
    <script>
        window.onload = () => {
            initApp();
            blockDevTools();
        };

        function initApp() {
            if (IS_PREVIEW) {
                currentState.allStudents = [...DUMMY_DATA];
                updateStats();
            }
            render();
        }

        function blockDevTools() {
            // Anti F12 & Ctrl+Shift+I
            document.onkeydown = function(e) {
                if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) {
                    return false;
                }
            };
        }

        async function apiCall(action, data = {}) {
            if (IS_PREVIEW) return { status: 'success', data: null }; // Mockup return

            showLoading(true);
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, ...data })
                });
                const result = await response.json();
                return result;
            } catch (err) {
                Swal.fire('Error', 'Gagal terhubung ke server', 'error');
                return { status: 'error' };
            } finally {
                showLoading(false);
            }
        }

        function navigateTo(view) {
            currentState.view = view;
            render();
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function render() {
            const container = document.getElementById('main-content');
            let html = '';

            switch(currentState.view) {
                case 'login':
                    html = document.getElementById('tpl-login').innerHTML;
                    break;
                case 'admin-login':
                    html = document.getElementById('tpl-admin-login').innerHTML;
                    break;
                case 'student-dash':
                    let s = currentState.user;
                    html = document.getElementById('tpl-student-dash').innerHTML
                        .replace('{{nama}}', s.nama).replace('{{nisn}}', s.nisn)
                        .replace('{{tempat}}', s.tempat).replace('{{tanggal}}', s.tanggal)
                        .replace('{{kelas}}', s.kelas)
                        .replace('{{check_sesuai}}', s.status === 'Sesuai' ? 'checked' : '')
                        .replace('{{check_tidak}}', s.status === 'Tidak Sesuai' ? 'checked' : '');
                    break;
                case 'admin-dash':
                    html = document.getElementById('tpl-admin-dash').innerHTML
                        .replace('{{total}}', currentState.stats.total)
                        .replace('{{sesuai}}', currentState.stats.sesuai)
                        .replace('{{tidak}}', currentState.stats.tidak)
                        .replace('{{belum}}', currentState.stats.belum);
                    break;
            }

            container.innerHTML = html;
            if (currentState.view === 'admin-dash') populateAdminTable();
        }

        // --- AUTH LOGIC ---
        function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            if (IS_PREVIEW) {
                const student = currentState.allStudents.find(s => s.nisn === user && s.nisn === pass);
                if (student) {
                    currentState.user = {...student};
                    Swal.fire({ icon: 'success', title: 'Berhasil Masuk!', text: 'Halo ' + student.nama, timer: 1500, showConfirmButton: false });
                    navigateTo('student-dash');
                } else {
                    Swal.fire('Gagal', 'Username atau Password salah!', 'error');
                }
            } else {
                // Real Login GAS Call
            }
        }

        function handleAdminLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === DUMMY_ADMIN_PASS) {
                Swal.fire({ icon: 'success', title: 'Akses Diterima!', text: 'Selamat Datang Pak Andhi!', timer: 1500, showConfirmButton: false });
                navigateTo('admin-dash');
            } else {
                Swal.fire('Waduh...', 'Passwordnya salah tuh Pak!', 'warning');
            }
        }

        function logout() {
            currentState.user = null;
            navigateTo('login');
            Swal.fire('Sesi Berakhir', 'Anda telah keluar sistem', 'info');
        }

        // --- STUDENT ACTIONS ---
        function submitKonfirmasi() {
            const val = document.querySelector('input[name="confirm"]:checked');
            if (!val) return Swal.fire('Peringatan', 'Pilih status konfirmasi dulu!', 'warning');
            
            currentState.user.status = val.value;
            // Update in local data
            const idx = currentState.allStudents.findIndex(x => x.nisn === currentState.user.nisn);
            if(idx > -1) currentState.allStudents[idx].status = val.value;
            
            updateStats();
            Swal.fire('Berhasil', 'Konfirmasi data telah disimpan', 'success');
        }

        // --- ADMIN ACTIONS ---
        function updateStats() {
            const d = currentState.allStudents;
            currentState.stats = {
                total: d.length,
                sesuai: d.filter(x => x.status === 'Sesuai').length,
                tidak: d.filter(x => x.status === 'Tidak Sesuai').length,
                belum: d.filter(x => x.status === 'Belum').length
            };
        }

        function populateAdminTable(filter = 'Semua') {
            const tbody = document.getElementById('admin-table-body');
            let data = currentState.allStudents;
            
            if (filter !== 'Semua') {
                data = data.filter(s => s.status === filter);
            }

            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-gray-50 border-b transition-colors">
                    <td class="p-3 font-medium text-blue-600">${s.nisn}</td>
                    <td class="p-3">${s.nama}</td>
                    <td class="p-3 text-center">${s.kelas}</td>
                    <td class="p-3 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${
                            s.status === 'Sesuai' ? 'bg-green-100 text-green-700' : 
                            s.status === 'Tidak Sesuai' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'
                        }">${s.status}</span>
                    </td>
                    <td class="p-3 text-center flex justify-center gap-2">
                        <button onclick="editSiswa('${s.nisn}')" class="p-1 text-blue-500 hover:text-blue-700">✏️</button>
                        <button onclick="deleteSiswa('${s.nisn}')" class="p-1 text-red-500 hover:text-red-700">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterData(f) {
            populateAdminTable(f);
        }

        function deleteSiswa(nisn) {
            Swal.fire({
                title: 'Yakin hapus?',
                text: "Data siswa dengan NISN " + nisn + " akan dihapus permanen",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) {
                    currentState.allStudents = currentState.allStudents.filter(s => s.nisn !== nisn);
                    updateStats();
                    render();
                    Swal.fire('Terhapus!', 'Data siswa telah dihapus.', 'success');
                }
            });
        }

        function showAddModal() {
            Swal.fire({
                title: 'Tambah Siswa Baru',
                html: `
                    <input id="swal-nisn" class="swal2-input" placeholder="NISN">
                    <input id="swal-nama" class="swal2-input" placeholder="Nama Lengkap">
                    <input id="swal-tempat" class="swal2-input" placeholder="Tempat Lahir">
                    <input id="swal-tgl" class="swal2-input" type="date">
                    <input id="swal-kelas" class="swal2-input" placeholder="Kelas">
                `,
                confirmButtonText: 'Simpan Data',
                showCancelButton: true,
                preConfirm: () => {
                    return {
                        nisn: document.getElementById('swal-nisn').value,
                        nama: document.getElementById('swal-nama').value,
                        tempat: document.getElementById('swal-tempat').value,
                        tanggal: document.getElementById('swal-tgl').value,
                        kelas: document.getElementById('swal-kelas').value,
                        status: 'Belum'
                    }
                }
            }).then((res) => {
                if (res.isConfirmed) {
                    currentState.allStudents.push(res.value);
                    updateStats();
                    render();
                    Swal.fire('Berhasil', 'Siswa baru ditambahkan', 'success');
                }
            });
        }

        function editSiswa(nisn) {
            const s = currentState.allStudents.find(x => x.nisn === nisn);
            Swal.fire({
                title: 'Edit Data Siswa',
                html: `
                    <input id="swal-nisn" class="swal2-input" value="${s.nisn}" readonly>
                    <input id="swal-nama" class="swal2-input" value="${s.nama}">
                    <input id="swal-tempat" class="swal2-input" value="${s.tempat}">
                    <input id="swal-tgl" class="swal2-input" type="date" value="${s.tanggal}">
                    <input id="swal-kelas" class="swal2-input" value="${s.kelas}">
                `,
                confirmButtonText: 'Update Data',
                showCancelButton: true,
                preConfirm: () => {
                    return {
                        nisn: s.nisn,
                        nama: document.getElementById('swal-nama').value,
                        tempat: document.getElementById('swal-tempat').value,
                        tanggal: document.getElementById('swal-tgl').value,
                        kelas: document.getElementById('swal-kelas').value,
                        status: s.status
                    }
                }
            }).then((res) => {
                if (res.isConfirmed) {
                    const idx = currentState.allStudents.findIndex(x => x.nisn === nisn);
                    currentState.allStudents[idx] = res.value;
                    render();
                    Swal.fire('Diperbarui', 'Data berhasil diubah', 'success');
                }
            });
        }

        function showImportModal() {
            Swal.fire({
                title: 'Import Kolektif (Excel)',
                html: `
                    <p class="text-xs text-gray-500 mb-4">Pilih file excel dengan kolom: NISN, Nama Siswa, Tempat Lahir, Tanggal Lahir, Kelas</p>
                    <input type="file" id="excel-file" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <button onclick="downloadTemplate()" class="mt-4 text-xs text-blue-600 underline">Download Template .xlsx</button>
                `,
                confirmButtonText: 'Proses Import',
                showCancelButton: true,
                preConfirm: () => {
                    const file = document.getElementById('excel-file').files[0];
                    if(!file) { Swal.showValidationMessage('Pilih file dulu!'); return; }
                    return file;
                }
            }).then((res) => {
                if(res.isConfirmed) processExcel(res.value);
            });
        }

        function downloadTemplate() {
            const ws = XLSX.utils.aoa_to_sheet([["NISN", "Nama Siswa", "Tempat Lahir", "Tanggal Lahir", "Kelas"]]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Siswa");
            XLSX.writeFile(wb, "Template_Data_Siswa.xlsx");
        }

        function processExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);
                
                // Map to our structure
                const newStudents = rows.map(r => ({
                    nisn: String(r['NISN'] || ''),
                    nama: r['Nama Siswa'] || '',
                    tempat: r['Tempat Lahir'] || '',
                    tanggal: r['Tanggal Lahir'] || '',
                    kelas: r['Kelas'] || '',
                    status: 'Belum'
                }));

                currentState.allStudents = [...currentState.allStudents, ...newStudents];
                updateStats();
                render();
                Swal.fire('Sukses', `Berhasil mengimport ${newStudents.length} data siswa`, 'success');
            };
            reader.readAsArrayBuffer(file);
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(currentState.allStudents);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap Data");
            XLSX.writeFile(wb, "Rekap_Konfirmasi_Siswa.xlsx");
            Swal.fire('Download', 'Rekapitulasi Excel siap diunduh', 'success');
        }

        function showSettingsModal() {
            Swal.fire({
                title: 'Pengaturan Admin',
                html: `
                    <div class="text-left">
                        <label class="text-xs font-bold">PASSWORD BARU PAK ANDHI</label>
                        <input id="new-admin-pass" type="password" class="swal2-input" placeholder="Password baru">
                    </div>
                `,
                confirmButtonText: 'Simpan Password',
                showCancelButton: true
            }).then(res => {
                if(res.isConfirmed) {
                    Swal.fire('Tersimpan', 'Password admin berhasil diubah', 'success');
                }
            })
        }
    </script>
</body>
</html>
