<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Siswa - SMPN 1 Dawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; user-select: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #1e40af, #3b82f6); color: white; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem 2rem; border-radius: 0.5rem; color: white; z-index: 10001; transform: translateY(150%); transition: transform 0.3s ease; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast"></div>

    <header class="w-full py-8 flex flex-col items-center">
        <img src="https://i.ibb.co.com/DPQsmGBk/logo-smp.png" alt="Logo" class="h-20 mb-3">
        <h1 class="text-2xl font-bold text-blue-900 text-center px-4">SMP NEGERI 1 DAWAN</h1>
        <p class="text-gray-500">Verifikasi Data Mandiri</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <!-- TAMPILAN LOGIN -->
        <section id="view-login" class="max-w-md mx-auto mt-6">
            <div class="glass-card p-8">
                <h2 class="text-xl font-bold text-center mb-6 text-gray-800">Login Siswa</h2>
                <div class="space-y-4">
                    <input type="text" id="siswa-user" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Masukkan NISN">
                    <input type="password" id="siswa-pass" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password (NISN)">
                    <button onclick="loginSiswa()" id="btn-login-siswa" class="w-full btn-primary py-3 rounded-lg font-bold">MASUK</button>
                </div>
                <div class="mt-8 pt-6 border-t text-center">
                    <button onclick="showAdminGate()" class="text-sm text-blue-600 font-medium hover:underline">Masuk sebagai Admin</button>
                </div>
            </div>
        </section>

        <!-- ADMIN GATE -->
        <section id="view-admin-gate" class="hidden max-w-md mx-auto mt-6">
            <div class="glass-card p-8 border-2 border-blue-100">
                <h2 class="text-lg font-bold text-center mb-4 italic text-blue-800">"Selamat Datang Pak Andhi"</h2>
                <input type="password" id="admin-pass" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password Admin">
                <button onclick="loginAdmin()" id="btn-login-admin" class="w-full bg-blue-800 text-white py-3 rounded-lg font-bold">BUKA DASHBOARD</button>
                <button onclick="showView('view-login')" class="w-full text-sm text-gray-500 py-2 mt-4">Kembali</button>
            </div>
        </section>

        <!-- DASHBOARD SISWA -->
        <section id="view-dash-siswa" class="hidden max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-700 uppercase tracking-wider">Data Profil Anda</h2>
                <button onclick="location.reload()" class="text-red-500 font-bold px-3 py-1 rounded">Keluar</button>
            </div>
            <div class="glass-card overflow-hidden">
                <div id="siswa-content" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div class="p-6 bg-blue-50 border-t">
                    <p class="font-bold mb-3 text-blue-900">Apakah data di atas sudah benar?</p>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 bg-white p-3 rounded border cursor-pointer">
                            <input type="radio" name="konf" value="Sesuai"> <span class="text-green-700 font-medium">Sudah Sesuai</span>
                        </label>
                        <label class="flex items-center gap-2 bg-white p-3 rounded border cursor-pointer">
                            <input type="radio" name="konf" value="Tidak Sesuai"> <span class="text-red-700 font-medium">Belum Sesuai (Ada Kesalahan)</span>
                        </label>
                    </div>
                    <button onclick="submitSiswa()" id="btn-konf" class="w-full btn-primary py-3 rounded-lg mt-4 font-bold shadow-lg">KIRIM KONFIRMASI</button>
                </div>
            </div>
        </section>

        <!-- DASHBOARD ADMIN -->
        <section id="view-dash-admin" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h1 class="text-2xl font-bold text-blue-900">Dashboard Admin</h1>
                <div class="flex gap-2">
                    <button onclick="showView('view-import')" class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold">Import Excel</button>
                    <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Logout</button>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="glass-card p-4 border-l-4 border-blue-500"><p class="text-xs">Total</p><h3 id="st-total" class="text-xl font-bold">0</h3></div>
                <div class="glass-card p-4 border-l-4 border-green-500"><p class="text-xs">Sesuai</p><h3 id="st-sesuai" class="text-xl font-bold">0</h3></div>
                <div class="glass-card p-4 border-l-4 border-red-500"><p class="text-xs">Salah</p><h3 id="st-salah" class="text-xl font-bold">0</h3></div>
                <div class="glass-card p-4 border-l-4 border-yellow-500"><p class="text-xs">Belum</p><h3 id="st-belum" class="text-xl font-bold">0</h3></div>
            </div>
            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 text-xs font-bold text-gray-500">NISN</th>
                                <th class="p-4 text-xs font-bold text-gray-500">Nama</th>
                                <th class="p-4 text-xs font-bold text-gray-500">Kelas</th>
                                <th class="p-4 text-xs font-bold text-gray-500 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- VIEW IMPORT -->
        <section id="view-import" class="hidden max-w-md mx-auto">
            <div class="glass-card p-8">
                <h2 class="font-bold mb-4 text-lg text-blue-900 text-center">Import Data</h2>
                <div class="border-2 border-dashed border-blue-200 rounded-lg p-6 text-center mb-4">
                    <input type="file" id="file-excel" class="block w-full text-sm">
                </div>
                <button onclick="doImport()" id="btn-imp" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">MULAI UPLOAD</button>
                <button onclick="showView('view-dash-admin')" class="w-full py-2 text-gray-500 mt-2 text-sm">Batal</button>
            </div>
        </section>
    </main>

    <footer class="text-center py-6 text-gray-400 text-xs mt-10">
        &copy; 2024 SMP Negeri 1 Dawan.
    </footer>

    <script>
        /** * PENTING: TEMPEL URL GAS ANDA DI SINI
         * Pastikan berakhiran /exec
         */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxdxuOVFmjS0yQPwCjxPRHvCdpK8khfP3S85L_gX5LDz-IwLp7yZVRqgQf73xNtw0AeIQ/exec"; 

        let userState = null;
        let dbSiswa = [];

        function showView(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
        }

        function showAdminGate() { showView('view-admin-gate'); }

        /**
         * FUNGSI KRUSIAL: Menggunakan 'no-cors' jika fetch biasa gagal.
         * Kami menggunakan URL query parameter agar lebih stabil untuk GET.
         */
        async function fetchGAS(params) {
            const query = new URLSearchParams(params).toString();
            const fullUrl = `${GAS_URL}?${query}`;
            
            try {
                // Gunakan mode cors secara default
                const response = await fetch(fullUrl, { method: 'GET' });
                const text = await response.text();
                return JSON.parse(text);
            } catch (error) {
                console.warn("Retrying with redirect logic...");
                // Jika gagal karena CORS, biasanya karena Google Apps Script melakukan Redirect
                // Kita coba buka di window baru atau tampilkan pesan instruksi
                showToast("Sistem sedang sinkronisasi, coba klik tombol sekali lagi.", "error");
                return { success: false, message: "Koneksi terhambat" };
            }
        }

        async function loginSiswa() {
            const u = document.getElementById('siswa-user').value;
            const p = document.getElementById('siswa-pass').value;
            if(!u || !p) return showToast("Isi NISN!", "error");
            
            setLoading('btn-login-siswa', true);
            const data = await fetchGAS({ action: 'loginSiswa', nisn: u, pass: p });
            if(data.success) {
                userState = data.data;
                renderSiswa();
                showView('view-dash-siswa');
            } else { 
                showToast(data.message || "Data tidak ditemukan", "error"); 
            }
            setLoading('btn-login-siswa', false);
        }

        async function loginAdmin() {
            const p = document.getElementById('admin-pass').value;
            setLoading('btn-login-admin', true);
            const data = await fetchGAS({ action: 'loginAdmin', pass: p });
            if(data.success) {
                loadAdminData();
            } else { 
                showToast("Password Admin Salah!", "error"); 
            }
            setLoading('btn-login-admin', false);
        }

        async function loadAdminData() {
            const data = await fetchGAS({ action: 'getAllSiswa' });
            if(data.success) {
                dbSiswa = data.data;
                renderAdminTable();
                showView('view-dash-admin');
            }
        }

        function renderAdminTable() {
            const b = document.getElementById('admin-table');
            b.innerHTML = '';
            let stats = { total:0, sesuai:0, salah:0, belum:0 };
            dbSiswa.forEach(siswa => {
                stats.total++;
                let statusClass = "bg-yellow-100 text-yellow-700";
                if(siswa.Status_Konfirmasi === 'Sesuai') { stats.sesuai++; statusClass = "bg-green-100 text-green-700"; }
                else if(siswa.Status_Konfirmasi === 'Tidak Sesuai') { stats.salah++; statusClass = "bg-red-100 text-red-700"; }
                else { stats.belum++; }

                b.innerHTML += `<tr>
                    <td class="p-4 text-sm font-mono">${siswa.NISN}</td>
                    <td class="p-4 text-sm font-bold">${siswa.Nama}</td>
                    <td class="p-4 text-sm">${siswa.Kelas}</td>
                    <td class="p-4 text-center">
                        <span class="text-[10px] px-2 py-1 rounded-full font-bold ${statusClass}">${siswa.Status_Konfirmasi || 'Belum'}</span>
                    </td>
                </tr>`;
            });
            document.getElementById('st-total').innerText = stats.total;
            document.getElementById('st-sesuai').innerText = stats.sesuai;
            document.getElementById('st-salah').innerText = stats.salah;
            document.getElementById('st-belum').innerText = stats.belum;
        }

        function renderSiswa() {
            const d = userState;
            document.getElementById('siswa-content').innerHTML = `
                <div class="p-3 bg-white rounded shadow-sm border">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">NISN</p><b>${d.NISN}</b>
                </div>
                <div class="p-3 bg-white rounded shadow-sm border">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Nama</p><b>${d.Nama}</b>
                </div>
                <div class="p-3 bg-white rounded shadow-sm border">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Tempat/Tgl Lahir</p><b>${d.Tempat_Lahir}, ${d.Tanggal_Lahir}</b>
                </div>
                <div class="p-3 bg-white rounded shadow-sm border">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Kelas</p><b>${d.Kelas}</b>
                </div>
            `;
        }

        async function submitSiswa() {
            const rad = document.querySelector('input[name="konf"]:checked');
            if(!rad) return showToast("Pilih konfirmasi!", "error");
            setLoading('btn-konf', true);
            const data = await fetchGAS({ action: 'submitKonfirmasi', nisn: userState.NISN, status: rad.value });
            if(data.success) {
                showToast("Berhasil Terkirim!", "success");
                setTimeout(() => location.reload(), 2000);
            }
            setLoading('btn-konf', false);
        }

        async function doImport() {
            const f = document.getElementById('file-excel').files[0];
            if(!f) return showToast("Pilih file!", "error");
            setLoading('btn-imp', true);
            const reader = new FileReader();
            reader.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                const jsonData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                // Mengirim data via POST (biasanya lebih aman untuk data besar)
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'importSiswa', data: jsonData })
                });
                const r = await res.json();
                if(r.success) {
                    showToast("Import Berhasil", "success");
                    loadAdminData();
                }
            };
            reader.readAsArrayBuffer(f);
            setLoading('btn-imp', false);
        }

        function setLoading(id, is) { 
            const b = document.getElementById(id);
            if(is) { b.disabled = true; b.innerHTML = `<span class="loader"></span>`; }
            else { b.disabled = false; b.innerHTML = "SELESAI"; }
        }

        function showToast(m, t) {
            const el = document.getElementById('toast');
            el.innerText = m; el.style.backgroundColor = t=='success'?'#10b981':'#ef4444';
            el.style.transform = 'translateY(0)';
            setTimeout(() => el.style.transform = 'translateY(150%)', 3000);
        }
    </script>
</body>
</html>
